  <!-- Front fins -->
  <path d="M36,6 L43,4 L43,7 L39,7Z" fill="none" stroke="#ff3355" stroke-width="0.8" opacity="0.55"/>
  <path d="M36,18 L43,20 L43,17 L39,17Z" fill="none" stroke="#ff3355" stroke-width="0.8" opacity="0.55"/>
  <!-- Rear spoiler uprights -->
  <rect x="1" y="5" width="3" height="5" rx="0.5" fill="none" stroke="#ff3355" stroke-width="0.8" opacity="0.55"/>
  <rect x="1" y="14" width="3" height="5" rx="0.5" fill="none" stroke="#ff3355" stroke-width="0.8" opacity="0.55"/>
  <!-- Nose light -->
