<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 24">
  <!-- Wide boxy body — chunky, car faces RIGHT -->
  <rect x="3" y="2" width="37" height="20" rx="2.5" fill="#2a2a2a"/>
  <!-- Front bumper bar -->
  <rect x="38" y="3" width="4" height="18" rx="1.5" fill="#333"/>
  <!-- Wide cockpit -->
  <rect x="14" y="5" width="16" height="14" rx="2" fill="#0d1a1a"/>
  <!-- Thick wheel arches -->
  <rect x="4" y="2" width="9" height="7.5" rx="1" fill="#1c1c1c"/>
  <rect x="4" y="14.5" width="9" height="7.5" rx="1" fill="#1c1c1c"/>
  <rect x="27" y="2" width="9" height="7.5" rx="1" fill="#1c1c1c"/>
  <rect x="27" y="14.5" width="9" height="7.5" rx="1" fill="#1c1c1c"/>
  <!-- Dual headlights -->
  <circle cx="42" cy="8" r="1.5" fill="#dddddd" opacity="0.7"/>
  <circle cx="42" cy="16" r="1.5" fill="#dddddd" opacity="0.7"/>
</svg>
